<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CKM Karoseri - Authenticating...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 8px; padding: 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #1a1a2e; margin-bottom: 10px; font-size: 1.5rem; }
    p { color: #555; line-height: 1.7; margin-bottom: 12px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #c0392b; background: #fdecea; border-radius: 6px; padding: 12px; margin-top: 16px; display: none; }
    .code-box { background: #f0f0f0; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin: 12px 0; display: none; }
    .note { font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CKM Karoseri</h1>
    <p id="status">Menyelesaikan autentikasi, harap tunggu...</p>
    <div class="spinner" id="spinner"></div>
    <div class="error" id="error-box"></div>
    <div class="code-box" id="code-box"></div>
    <p class="note" id="note" style="display:none;">Anda dapat menutup tab ini setelah aplikasi terbuka kembali.</p>
  </div>

  <script>
    const LOCAL_PORT = 8765; // Sesuaikan dengan port yang dipakai app kamu

    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const errorDesc = params.get('error_description');

    if (error) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'Autentikasi gagal.';
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.textContent = errorDesc || error;
    } else if (code) {
      // Forward ke local app
      const localUrl = `http://localhost:${LOCAL_PORT}/callback?code=${encodeURIComponent(code)}${state ? '&state=' + encodeURIComponent(state) : ''}`;

      setTimeout(() => {
        window.location.href = localUrl;
      }, 800);

      // Fallback jika local app tidak merespons
      setTimeout(() => {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Tidak dapat terhubung ke aplikasi lokal.';
        document.getElementById('error-box').style.display = 'block';
        document.getElementById('error-box').textContent = 'Pastikan aplikasi CKM Karoseri sedang berjalan, lalu coba login kembali.';
        const codeBox = document.getElementById('code-box');
        codeBox.style.display = 'block';
        codeBox.textContent = 'Authorization Code: ' + code;
        document.getElementById('note').style.display = 'block';
        document.getElementById('note').textContent = 'Jika aplikasi tidak terbuka otomatis, salin kode di atas.';
      }, 5000);
    } else {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'Parameter tidak ditemukan.';
      document.getElementById('error-box').style.display = 'block';
      document.getElementById('error-box').textContent = 'Tidak ada authorization code yang diterima dari TikTok.';
    }
  </script>
</body>
</html>
